<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Score Keeper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section id="team-a">
    <h2>Gryffindor</h2>
    <p>Score: <span id="score-a">0</span></p>
    <button id="decrement-a" type="button">-</button>
    <button id="increment-a" type="button">+</button>
  </section>

  <section id="team-b">
    <h2>Slytherin</h2>
    <p>Score: <span id="score-b">0</span></p>
    <button id="decrement-b" type="button">-</button>
    <button id="increment-b" type="button">+</button>
  </section>
  <script src="script.js"></script>
</body>
</html>
